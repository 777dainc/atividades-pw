<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro</title>
</head>
<body>
    <form>

    <h1>Tela de Cadastro</h1>
    <h4>01ª Qual o curso que está estudando?</h4>

    <div>
    <input type="radio" id="informática" name="Curso" value="informática" required>
    <label for="informática"> Informática</label>
    </div>

    <div>
    <input type="radio" id="rd" name="Curso" value="rd" required>
    <label for="rd">Redes de Computadores</label>
    </div>

    <div>
    <input type="radio" id="cg" name="Curso" value="cg" required>
    <label for="cg">Computação Gráfica</label>
    </div>

    <div>
        <input type="radio" id="ds" name="Curso" value="ds" required>
        <label for="ds">Desenvlvimento de Sistemas</label>
    </div>

    <div>
        <input type="radio" id="pjd" name="Curso" value="pjd" required>
        <label for="pjd">Programação de Jogos Digitais</label>
    </div>

    <h4>2ª Quais as disciplinas que está estudando?</h4>

    <div>
    <input type="checkbox" id="html" name="disciplinas" value="html" checked >
    <label for="html">HTML</label>
    </div>

    <div>
        <input type="checkbox" id="css" name="disciplinas" value="css">
        <label for="css">CSS</label>
    </div>

    <div>
        <input type="checkbox" id="php" name="disciplinas" value="php">
        <label for="php">PHP</label>
    </div>

    <div>
        <input type="checkbox" id="BD" name="disciplinas" value="BD">
        <label for="BD">Banco de Dados</label>
    </div>

    <div>
        <input type="checkbox" id="JAVA" name="disciplinas" value="JAVA">
        <label for="JAVA">JAVA</label>
    </div>

    <div>
        <input type="checkbox" id="Redes de Computadores" name="disciplinas" value="Redes de Computadores">
        <label for="Redes de Computadores">Redes de Computadores</label>
    </div>

    <br>
    
    <button type="reset" >Apagar</button>
    <button type="submit ">Enviar</button>

    </form>
    
</body>
</html>
